# Tag-driven release workflow.
#
# Triggered when a tag matching `v*` is pushed:
#   git tag -a v0.1.0 -m "v0.1.0"
#   git push origin v0.1.0
#
# Requires repo secrets (Settings → Secrets → Actions):
#   GPG_PRIVATE_KEY   ASCII-armored, passphrase-encrypted private key
#                     (gpg --armor --export-secret-keys $FINGERPRINT)
#   PASSPHRASE        the GPG key passphrase
#
# The fingerprint is derived from the imported key at runtime — no extra secret needed.

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to upload release artifacts

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0  # v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd  # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89  # v7.2.2
        with:
          version: '~> v2'
          args: release --clean
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
