# GoReleaser config — produces the binary matrix the Terraform Registry
# expects (linux/darwin/windows/freebsd × amd64/arm/arm64/386), the
# SHA256SUMS file, and a detached GPG signature of those sums.
#
# Triggered manually by `goreleaser release --clean` after a `git tag`
# OR by the .github/workflows/release.yml workflow when you push a tag.
#
# See docs/RELEASING.md for the one-time GPG + registry setup.

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X main.version={{.Version}}'
    goos:
      - freebsd
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - '386'
      - arm
      - arm64
    ignore:
      - goos: darwin
        goarch: '386'
      - goos: darwin
        goarch: arm
    binary: '{{ .ProjectName }}_v{{ .Version }}'

archives:
  - formats: [zip]
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

checksum:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

# SBOM generation is intentionally OFF for v0.2.x.
#
# GoReleaser v2 unconditionally includes SBOMs (.spdx.json) in
# SHA256SUMS — there's no `checksum.disable_sbom` flag. The Terraform
# Registry's release-import flow rejects any SHA256SUMS entry it doesn't
# have a slot for, so the extra .spdx.json rows cause Registry indexing
# to fail with "missing files in request body" (v0.2.0 and v0.2.1 hit
# this and never published).
#
# Re-add SBOMs in v0.3 via a post-GoReleaser step in release.yml that
# runs Syft separately and uploads the SBOMs to the release with
# `gh release upload` — keeping them out of dist/ during the checksum
# step.

release:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'

changelog:
  disable: true
