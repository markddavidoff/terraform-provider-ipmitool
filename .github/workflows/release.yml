# Tag-driven release workflow — split into two jobs to limit blast radius
# of any compromised action: `build` runs unsigned and never sees the GPG
# secrets; `sign` downloads the build artifact, imports GPG, signs, and
# publishes. SLSA build provenance is attested in the sign job after the
# artifacts are finalized so the attestation references the signed bytes.
#
# Triggered when a tag matching `v*` is pushed:
#   git tag -s v0.2.0 -m "v0.2.0"
#   git push origin v0.2.0
#
# Required repo secrets (Settings → Secrets → Actions):
#   GPG_PRIVATE_KEY   ASCII-armored, passphrase-encrypted private key
#                     (gpg --armor --export-secret-keys $FINGERPRINT)
#   PASSPHRASE        the GPG key passphrase

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0  # v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      # Snapshot build is unsigned; produces the same artifact layout as
      # a real release so the sign job can sign+publish them as-is.
      - name: Build (unsigned snapshot)
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89  # v7.2.2
        with:
          version: '~> v2'
          args: release --snapshot --clean --skip=sign,publish,sbom

      - name: Upload build artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5.0.0
        with:
          name: dist
          path: dist/
          retention-days: 1

  sign:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write       # to upload the GitHub Release
      id-token: write       # for SLSA OIDC attestation
      attestations: write   # to write the attestation
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0  # v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download build artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6.0.0
        with:
          name: dist
          path: dist/

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd  # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      # Real release — skips the build step (artifacts already exist
      # from the build job) and runs sign + sbom + publish.
      - name: Sign + Publish
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89  # v7.2.2
        with:
          version: '~> v2'
          args: release --clean --skip=build
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@62fc1d596301d0ab9914e1fec14dc5c8d93f65cd  # v3.2.0
        with:
          subject-path: |
            dist/*.zip
            dist/*_SHA256SUMS
