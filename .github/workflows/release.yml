# Tag-driven release workflow.
#
# Triggered when a tag matching `v*` is pushed:
#   git tag -s v0.1.0 -m "v0.1.0"
#   git push origin v0.1.0
#
# Requires repo secrets (Settings → Secrets → Actions):
#   GPG_PRIVATE_KEY   the ASCII-armored private key (gpg --armor --export-secret-keys $FINGERPRINT)
#   PASSPHRASE        the GPG key passphrase (empty string if none)
#
# The fingerprint is derived from the imported key at runtime — no extra secret needed.

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to upload release artifacts

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
