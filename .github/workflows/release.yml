# Tag-driven release workflow — pragmatic split into two jobs:
#
#   build: validates that the release configuration produces artifacts
#          successfully, WITHOUT decrypting any GPG material. Runs a
#          --snapshot release that skips publish/sign/sbom. If this
#          fails the `sign` job (which needs:) never runs and the GPG
#          secrets are never injected into the workflow.
#
#   sign:  the actual release. Imports GPG, runs the full goreleaser
#          release flow (build + archive + checksum + sbom + sign +
#          publish), then attests build provenance via Sigstore.
#
# This split limits the blast radius of a compromised action in the
# build phase: it gets RCE on the runner but can never touch
# GPG_PRIVATE_KEY / PASSPHRASE because those secrets are scoped to
# the sign job's env. Note that GoReleaser does not support
# "build once, sign later" — the sign job re-builds from source.
# That's a GoReleaser architecture constraint, not a workflow design
# choice; the protection here is GPG-scope isolation, not artifact-byte
# isolation.
#
# Triggered when a tag matching `v*` is pushed:
#   git tag -s v0.2.0 -m "v0.2.0"
#   git push origin v0.2.0
#
# Required repo secrets (Settings → Secrets → Actions):
#   GPG_PRIVATE_KEY   ASCII-armored, passphrase-encrypted private key
#                     (gpg --armor --export-secret-keys $FINGERPRINT)
#   PASSPHRASE        the GPG key passphrase

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      # Snapshot release validates the full chain (build matrix,
      # archives, checksums) without needing GPG. If this fails the
      # sign job (needs:) doesn't run.
      - name: Validate release flow (snapshot, no sign)
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89  # v7.2.2
        with:
          version: '~> v2'
          args: release --snapshot --clean --skip=publish,sign,sbom

  sign:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write       # publish the GitHub Release
      id-token: write       # SLSA OIDC attestation
      attestations: write   # write the attestation
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      # Syft is intentionally NOT installed — SBOMs are off until v0.3.
      # See .goreleaser.yml for the rationale (Terraform Registry can't
      # import SHA256SUMS entries it doesn't have slots for).

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd  # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Release (build + archive + checksum + sbom + sign + publish)
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89  # v7.2.2
        with:
          version: '~> v2'
          args: release --clean
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f  # v3.2.0
        with:
          subject-path: |
            dist/*.zip
            dist/*_SHA256SUMS
