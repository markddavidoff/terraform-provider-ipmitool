# GoReleaser config — produces the binary matrix the Terraform Registry
# expects (linux/darwin/windows/freebsd × amd64/arm/arm64/386), the
# SHA256SUMS file, and a detached GPG signature of those sums.
#
# Triggered manually by `goreleaser release --clean` after a `git tag`
# OR by the .github/workflows/release.yml workflow when you push a tag.
#
# See docs/RELEASING.md for the one-time GPG + registry setup.

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X main.version={{.Version}}'
    goos:
      - freebsd
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - '386'
      - arm
      - arm64
    ignore:
      - goos: darwin
        goarch: '386'
      - goos: darwin
        goarch: arm
    binary: '{{ .ProjectName }}_v{{ .Version }}'

archives:
  - formats: [zip]
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

checksum:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

# SBOM generation via the built-in Syft integration. Produces one
# .spdx.json per archive; uploaded alongside the zips by the release
# step so adopters can scan with Trivy / Snyk / etc.
sboms:
  - artifacts: archive
    documents:
      - "${artifact}.spdx.json"

release:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'

changelog:
  disable: true
